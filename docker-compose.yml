version: "3.9"
services:

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        echo 'Waiting for Ollama...' &&
        until curl -sf http://localhost:11434/api/tags; do sleep 2; done &&
        ollama pull mistral:7b-instruct-q4_K_M &&
        echo 'Model ready.' &&
        wait
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./backend/knowledge_base:/app/knowledge_base
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODELS_DIR=/app/models
      - KNOWLEDGE_BASE_DIR=/app/knowledge_base
      - FAITHFULNESS_THRESHOLD=0.85
      - MAX_REFINEMENT_ITERATIONS=2
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ollama_data:
